            if (type === 'alerta') bgClass = 'bg-orange-500';
            if (type === 'sucesso') bgClass = 'bg-green-600';
            
            toast.className = `${bgClass} text-white px-6 py-3 rounded-xl shadow-lg text-sm font-semibold slide-up`;
            toast.innerHTML = message;
            container.appendChild(toast);

                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';

            if (state.estatisticas.rocaParaRoca > 0) {
                htmlComportamento += `
                    <div class="flex items-start gap-3 mb-3">
                        <span class="text-green-500 text-xl">✓</span>
                        <p class="text-gray-700 text-sm">Você pagou as contas da atividade com o dinheiro da própria atividade em <strong>${state.estatisticas.rocaParaRoca}</strong> ocasião(ões).</p>
                    </div>
                `;
            }

            let htmlLucro = '';
            if (state.salario > 0) {
                const saldoFinalCasa = state.saldos.casa + state.salario;
                htmlLucro = `
                    <div class="mt-5 p-4 rounded-2xl ${state.lucroReal >= 0 ? 'bg-green-50 border border-green-200' : 'bg-red-50 border border-red-200'}">
                        <h3 class="text-sm font-bold ${state.lucroReal >= 0 ? 'text-green-800' : 'text-red-800'} uppercase mb-2">Resultado Real da Atividade</h3>
                        <p class="text-sm text-gray-700 mb-2">Abatendo o valor do seu trabalho (${formatMoney(state.salario)}) do saldo final da atividade (${formatMoney(state.saldos.roca)}):</p>
                        <p class="font-extrabold text-xl ${state.lucroReal >= 0 ? 'text-green-600' : 'text-red-600'}">
                            ${state.lucroReal >= 0 ? '✅ Lucro de ' : '⚠ Prejuízo de '} ${formatMoney(Math.abs(state.lucroReal))}
                        </p>
                    </div>

                    <div class="mt-3 p-4 rounded-2xl ${saldoFinalCasa >= 0 ? 'bg-blue-50 border border-blue-200' : 'bg-red-50 border border-red-200'}">
                        <h3 class="text-sm font-bold ${saldoFinalCasa >= 0 ? 'text-blue-800' : 'text-red-800'} uppercase mb-2">Situação da Casa</h3>
                        <p class="text-sm text-gray-700 mb-2">Somando o seu salário (${formatMoney(state.salario)}) com as contas e saldos da casa (${formatMoney(state.saldos.casa)}):</p>
                        <p class="font-extrabold text-xl ${saldoFinalCasa >= 0 ? 'text-blue-600' : 'text-red-600'}">
                            ${saldoFinalCasa >= 0 ? '🏠 Casa no Azul: ' : '⚠ Casa no Vermelho: '} ${formatMoney(saldoFinalCasa)}
                        </p>
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="slide-up w-full max-w-md mx-auto">
                    <div class="bg-white p-6 rounded-3xl card-shadow mb-6">
                        <h2 class="text-xl font-bold text-brand-dark mb-6">Durante este mês você decidiu:</h2>
                        <div class="mb-2">
                            ${htmlComportamento || '<p class="text-gray-600 text-sm">As despesas e receitas foram administradas sem misturar os caixas.</p>'}
                        </div>
                        ${htmlLucro}
                    </div>
                    
                    <div class="bg-white p-6 rounded-3xl card-shadow mb-6">
                        <h3 class="text-sm font-bold text-gray-500 uppercase mb-4 tracking-wider">Como ficaram os saldos</h3>
                        
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-gray-600">Total que Entrou</span>
                            <span class="font-bold text-green-600">${formatMoney(state.estatisticas.entrou)}</span>
                        </div>
                        <div class="flex justify-between items-center mb-6 pb-6 border-b border-gray-100">
                            <span class="text-gray-600">Total que Saiu</span>
                            <span class="font-bold text-red-600">${formatMoney(state.estatisticas.saiu)}</span>
                        </div>
                        
                        <div class="flex justify-between items-center mb-3 bg-orange-50 p-3 rounded-xl border border-orange-100">
                            <span class="font-bold text-brand-farm">Caixa da ${modulo.nome} ${modulo.icone}</span>
                            <span class="font-extrabold text-xl text-brand-farm">${formatMoney(state.saldos.roca)}</span>
                        </div>
                        <div class="flex justify-between items-center bg-blue-50 p-3 rounded-xl border border-blue-100">
                            <span class="font-bold text-brand-house">Caixa da Casa 🏠</span>
                            <span class="font-extrabold text-xl text-brand-house">${formatMoney(state.saldos.casa)}</span>
                        </div>
                    </div>

                    <button onclick="renderEncerramento()" class="btn-press bg-brand-green text-white font-bold text-xl py-4 w-full rounded-2xl shadow-lg hover:bg-green-700">
                        Avançar
                    </button>
                </div>
            `;
        };

        const renderEncerramento = () => {
            limparTela();
            const modulo = modulos[state.moduloId];
            
            container.innerHTML = `
                <div class="fade-in w-full text-center max-w-md mx-auto py-8">
                    <p class="text-xl sm:text-2xl font-bold text-brand-dark mb-8 leading-snug">
                        Hoje você conseguiu fazer uma conta que muitos produtores nunca tiveram a oportunidade de fazer.
                    </p>
                    <p class="text-lg text-gray-700 mb-8 leading-relaxed">
                        Agora ficou mais fácil perceber como misturar o dinheiro da casa com o dinheiro da <span class="font-bold">${modulo.nome.toLowerCase()}</span> dificulta saber quanto realmente sobra no final do mês.
                    </p>
                    <p class="text-sm font-bold text-gray-500 uppercase tracking-wider mb-12">
                        O número não é uma sentença.<br>Ele apenas mostra onde existe oportunidade para melhorar.
                    </p>
                    
                    <div class="bg-white p-8 rounded-3xl card-shadow border-t-4 border-brand-green mb-10">
                        <div class="text-5xl mb-4">📓</div>
                        <h3 class="text-2xl font-extrabold text-brand-dark mb-4">O Caderno de Caixa</h3>
                        <p class="text-gray-600 text-sm leading-relaxed mb-6">
                            Ele foi criado justamente para ajudar você a registrar tudo o que entra e tudo o que sai da propriedade. Assim, no final de cada mês, você consegue descobrir quanto realmente sobrou.
                        </p>
                        <p class="text-brand-green font-bold">Nossa equipe da LAMF5 está aqui para ajudar você a começar.</p>
                    </div>

                    <button onclick="renderTelaAbertura()" class="btn-press bg-gray-200 text-gray-700 font-bold text-lg py-4 px-8 rounded-2xl hover:bg-gray-300 w-full sm:w-auto">
                        Encerrar e Voltar ao Início
                    </button>
                </div>
            `;
        };

        // Inicia a aplicação na primeira tela
        window.onload = renderTelaAbertura;
    </script>
</body>
</html>
